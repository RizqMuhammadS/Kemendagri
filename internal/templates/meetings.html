<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rapat - Sistem Notulensi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { min-height: 100vh; }
        @media (max-width: 768px) { .sidebar { min-height: auto; } }
        .meeting-card:hover .delete-btn { opacity: 1; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .status-badge { font-size: 0.75rem; }
        .filter-panel { transition: all 0.3s ease; }
        .filter-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .date-input { font-size: 0.875rem; }
        .filter-section { transition: max-height 0.3s ease, opacity 0.3s ease; }
        .badge-filter-count {
            background-color: #4f46e5;
            color: white;
            border-radius: 9999px;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col md:flex-row">
        <aside class="sidebar bg-indigo-800 text-white w-full md:w-64 p-4">
            <div class="text-xl font-bold mb-8">
                <i class="fas fa-file-alt mr-2"></i>Notulensi AI
            </div>
            <nav>
                <a href="/dashboard" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-tachometer-alt w-6"></i> Dashboard
                </a>
                <a href="/meetings" class="flex items-center py-2 px-4 rounded bg-indigo-700 mb-1">
                    <i class="fas fa-list w-6"></i> Daftar Rapat
                </a>
                <a href="/meetings/create" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-plus-circle w-6"></i> Buat Rapat
                </a>
                <hr class="my-4 border-indigo-600">
                <div id="userName" class="text-sm px-4 mb-2 opacity-75">User</div>
                <button onclick="logout()" class="flex items-center py-2 px-4 rounded hover:bg-red-600 w-full text-left">
                    <i class="fas fa-sign-out-alt w-6"></i> Logout
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-list mr-2 text-indigo-600"></i>Daftar Rapat
                    </h1>
                    <a href="/meetings/create" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 text-sm">
                        <i class="fas fa-plus mr-1"></i>Buat Rapat Baru
                    </a>
                </div>

                <div id="loading" class="text-center py-12">
                    <i class="fas fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
                    <p class="text-gray-500">Memuat daftar rapat...</p>
                </div>

                <!-- Search + Filter Section -->
                <div class="mb-6 bg-white rounded-lg shadow p-4">
                    <!-- Search Bar -->
                    <div class="flex gap-2 mb-4">
                        <div class="relative flex-1">
                            <input type="text" id="searchInput" placeholder="Cari rapat berdasarkan judul, lokasi..." 
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                oninput="onSearchInput()"
                                onkeydown="if(event.key === 'Enter') { clearTimeout(searchTimeout); searchMeetings(); }">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                        <button onclick="searchMeetings()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 text-sm flex items-center gap-1">
                            <i class="fas fa-search"></i> Cari
                        </button>
                        <button id="clearSearchBtn" onclick="clearSearch()" class="hidden bg-gray-200 text-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300 text-sm flex items-center gap-1">
                            <i class="fas fa-times"></i> Hapus
                        </button>
                        <!-- Toggle Filter Button -->
                        <button onclick="toggleFilter()" class="border border-gray-300 text-gray-600 px-3 py-2 rounded-lg hover:bg-gray-50 text-sm flex items-center gap-1" title="Filter">
                            <i class="fas fa-filter"></i>
                            <span id="filterBadge" class="hidden badge-filter-count">0</span>
                        </button>
                    </div>

                    <!-- Filter Panel (collapsible) -->
                    <div id="filterPanel" class="hidden filter-panel">
                        <div class="border-t pt-4">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <!-- Filter Status -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        <i class="fas fa-flag mr-1 text-indigo-500"></i>Status
                                    </label>
                                    <select id="filterStatus" onchange="applyFilters()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                        <option value="">Semua Status</option>
                                        <option value="completed">Selesai</option>
                                        <option value="processing">Diproses</option>
                                        <option value="pending">Menunggu</option>
                                        <option value="failed">Gagal</option>
                                        <option value="transcribed">Tertranskrip</option>
                                    </select>
                                </div>

                                <!-- Filter Tanggal -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        <i class="fas fa-calendar mr-1 text-indigo-500"></i>Tanggal
                                    </label>
                                    <select id="filterDatePreset" onchange="onDatePresetChange()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                        <option value="">Semua Tanggal</option>
                                        <option value="today">Hari Ini</option>
                                        <option value="yesterday">Kemarin</option>
                                        <option value="7days">7 Hari Terakhir</option>
                                        <option value="30days">30 Hari Terakhir</option>
                                        <option value="thisMonth">Bulan Ini</option>
                                        <option value="custom">Kustom</option>
                                    </select>
                                    <div id="customDateRange" class="hidden mt-2 flex gap-2">
                                        <div>
                                            <input type="date" id="filterDateFrom" onchange="applyFilters()" class="date-input w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Dari">
                                        </div>
                                        <div>
                                            <input type="date" id="filterDateTo" onchange="applyFilters()" class="date-input w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Sampai">
                                        </div>
                                    </div>
                                </div>

                                <!-- Filter Lokasi -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        <i class="fas fa-map-marker-alt mr-1 text-indigo-500"></i>Lokasi
                                    </label>
                                    <select id="filterLocation" onchange="applyFilters()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                        <option value="">Semua Lokasi</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Filter Actions -->
                            <div class="flex justify-between items-center mt-4 pt-3 border-t">
                                <div id="filterInfo" class="text-sm text-gray-500">
                                    <i class="fas fa-info-circle mr-1"></i>
                                    <span id="filterResultCount">Menampilkan semua rapat</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="resetFilters()" class="text-sm text-gray-600 px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-50 flex items-center gap-1">
                                        <i class="fas fa-undo"></i> Reset
                                    </button>
                                    <button onclick="toggleFilter()" class="text-sm text-gray-600 px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-50 flex items-center gap-1">
                                        <i class="fas fa-times"></i> Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Active Filter Tags -->
                    <div id="activeFilters" class="hidden flex flex-wrap gap-2 mt-3"></div>
                </div>

                <div id="meetingList" class="hidden space-y-4"></div>

                <div id="emptyState" class="hidden text-center py-12 bg-white rounded-lg shadow">
                    <i id="emptyIcon" class="fas fa-folder-open text-5xl text-gray-300 mb-4"></i>
                    <p id="emptyTitle" class="text-gray-500 text-lg">Belum ada rapat</p>
                    <p id="emptyDesc" class="text-gray-400 text-sm mt-1">Buat rapat baru untuk memulai</p>
                    <a id="emptyAction" href="/meetings/create" class="text-indigo-600 hover:underline mt-2 inline-block">Buat rapat baru</a>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="hidden flex justify-center items-center gap-4 mt-6"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        function getToken() { return localStorage.getItem('token'); }

        async function apiRequest(method, path, data) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const config = { method, headers };
            if (data) config.body = JSON.stringify(data);
            const res = await fetch(API_BASE + path, config);
            let json;
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                json = await res.json();
            } else {
                const text = await res.text();
                json = { success: false, error: text || 'Unknown error (status ' + res.status + ')' };
            }
            if (!json.success && res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
            return json;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = 'fixed top-4 right-4 px-6 py-3 rounded shadow-lg text-white z-50 ' + (type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        let currentPage = 1;
        let totalMeetings = 0;
        let currentSearch = '';
        const pageSize = 10;
        let searchTimeout = null;

        // Filter state
        let activeFilters = {
            status: '',
            datePreset: '',
            dateFrom: '',
            dateTo: '',
            location: ''
        };

        function toggleFilter() {
            const panel = document.getElementById('filterPanel');
            panel.classList.toggle('hidden');
        }

        function onDatePresetChange() {
            const preset = document.getElementById('filterDatePreset').value;
            const customRange = document.getElementById('customDateRange');
            if (preset === 'custom') {
                customRange.classList.remove('hidden');
            } else {
                customRange.classList.add('hidden');
                // Clear custom date values when not custom
                document.getElementById('filterDateFrom').value = '';
                document.getElementById('filterDateTo').value = '';
            }
            applyFilters();
        }

        function applyFilters() {
            activeFilters.status = document.getElementById('filterStatus').value;
            activeFilters.datePreset = document.getElementById('filterDatePreset').value;
            activeFilters.dateFrom = document.getElementById('filterDateFrom').value;
            activeFilters.dateTo = document.getElementById('filterDateTo').value;
            activeFilters.location = document.getElementById('filterLocation').value;

            updateFilterUI();
            filterMeetings();
        }

        function resetFilters() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterDatePreset').value = '';
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            document.getElementById('filterLocation').value = '';
            document.getElementById('customDateRange').classList.add('hidden');

            activeFilters = { status: '', datePreset: '', dateFrom: '', dateTo: '', location: '' };
            updateFilterUI();
            filterMeetings();
        }

        function getActiveFilterCount() {
            let count = 0;
            if (activeFilters.status) count++;
            if (activeFilters.datePreset) count++;
            if (activeFilters.dateFrom || activeFilters.dateTo) {
                // Only count if it's custom range (since preset already counted)
                if (activeFilters.datePreset === 'custom') count++;
            }
            if (activeFilters.datePreset === '') {
                // Check if custom range is filled without preset being custom
                if (activeFilters.dateFrom || activeFilters.dateTo) count++;
            }
            if (activeFilters.location) count++;
            return count;
        }

        function updateFilterUI() {
            const count = getActiveFilterCount();
            const badge = document.getElementById('filterBadge');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // Update active filter tags
            const tagsContainer = document.getElementById('activeFilters');
            tagsContainer.innerHTML = '';
            let hasTags = false;

            const statusMap = { 'completed': 'Selesai', 'processing': 'Diproses', 'pending': 'Menunggu', 'failed': 'Gagal', 'transcribed': 'Tertranskrip' };
            const datePresetMap = { 'today': 'Hari Ini', 'yesterday': 'Kemarin', '7days': '7 Hari Terakhir', '30days': '30 Hari Terakhir', 'thisMonth': 'Bulan Ini', 'custom': 'Kustom' };

            function addTag(label, value, onRemove) {
                hasTags = true;
                const tag = document.createElement('span');
                tag.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700';
                tag.innerHTML = `${label}: <strong>${value}</strong> <button onclick="${onRemove}" class="ml-1 hover:text-indigo-900"><i class="fas fa-times"></i></button>`;
                tagsContainer.appendChild(tag);
            }

            if (activeFilters.status) {
                addTag('Status', statusMap[activeFilters.status] || activeFilters.status, "document.getElementById('filterStatus').value=''; applyFilters()");
            }

            if (activeFilters.datePreset && activeFilters.datePreset !== 'custom') {
                addTag('Tanggal', datePresetMap[activeFilters.datePreset] || activeFilters.datePreset, "document.getElementById('filterDatePreset').value=''; applyFilters()");
            } else if (activeFilters.datePreset === 'custom' || activeFilters.dateFrom || activeFilters.dateTo) {
                let dateLabel = '';
                if (activeFilters.dateFrom && activeFilters.dateTo) {
                    dateLabel = activeFilters.dateFrom + ' s/d ' + activeFilters.dateTo;
                } else if (activeFilters.dateFrom) {
                    dateLabel = 'Dari ' + activeFilters.dateFrom;
                } else if (activeFilters.dateTo) {
                    dateLabel = 'Sampai ' + activeFilters.dateTo;
                }
                if (dateLabel) {
                    addTag('Tanggal', dateLabel, "document.getElementById('filterDatePreset').value=''; document.getElementById('filterDateFrom').value=''; document.getElementById('filterDateTo').value=''; document.getElementById('customDateRange').classList.add('hidden'); applyFilters()");
                }
            }

            if (activeFilters.location) {
                addTag('Lokasi', activeFilters.location, "document.getElementById('filterLocation').value=''; applyFilters()");
            }

            if (hasTags) {
                tagsContainer.classList.remove('hidden');
            } else {
                tagsContainer.classList.add('hidden');
            }
        }

        // Date filter checking helper
        function isDateInRange(dateStr, preset, dateFrom, dateTo) {
            if (!preset && !dateFrom && !dateTo) return true;

            const meetingDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Normalize meeting date to start of day
            meetingDate.setHours(0, 0, 0, 0);

            switch (preset) {
                case 'today':
                    return meetingDate.getTime() === today.getTime();
                case 'yesterday': {
                    const yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);
                    return meetingDate.getTime() === yesterday.getTime();
                }
                case '7days': {
                    const sevenDaysAgo = new Date(today);
                    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6);
                    return meetingDate >= sevenDaysAgo && meetingDate <= today;
                }
                case '30days': {
                    const thirtyDaysAgo = new Date(today);
                    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 29);
                    return meetingDate >= thirtyDaysAgo && meetingDate <= today;
                }
                case 'thisMonth': {
                    const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                    const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    return meetingDate >= startOfMonth && meetingDate <= endOfMonth;
                }
                default:
                    break;
            }

            // Custom range check
            if (dateFrom && dateTo) {
                const from = new Date(dateFrom);
                const to = new Date(dateTo);
                to.setHours(23, 59, 59, 999);
                return meetingDate >= from && meetingDate <= to;
            } else if (dateFrom) {
                const from = new Date(dateFrom);
                return meetingDate >= from;
            } else if (dateTo) {
                const to = new Date(dateTo);
                to.setHours(23, 59, 59, 999);
                return meetingDate <= to;
            }

            return true;
        }

        function onSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 200);
        }

        function filterMeetings() {
            const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
            currentSearch = searchVal;

            if (searchVal !== '') {
                document.getElementById('clearSearchBtn').classList.remove('hidden');
            } else {
                document.getElementById('clearSearchBtn').classList.add('hidden');
            }

            const container = document.getElementById('meetingList');
            const cards = container.querySelectorAll('.meeting-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const title = (card.getAttribute('data-title') || '').toLowerCase();
                const location = (card.getAttribute('data-location') || '').toLowerCase();
                const status = card.getAttribute('data-status') || '';
                const date = card.getAttribute('data-date') || '';

                // Text search filter
                const matchesSearch = !searchVal || title.includes(searchVal) || location.includes(searchVal);

                // Status filter
                const matchesStatus = !activeFilters.status || status === activeFilters.status;

                // Date filter
                const matchesDate = isDateInRange(date, activeFilters.datePreset, activeFilters.dateFrom, activeFilters.dateTo);

                // Location filter
                const cardLocation = (card.getAttribute('data-location') || '').trim();
                const matchesLocation = !activeFilters.location || cardLocation.toLowerCase() === activeFilters.location.toLowerCase();

                if (matchesSearch && matchesStatus && matchesDate && matchesLocation) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Update filter result count info
            const filterInfo = document.getElementById('filterResultCount');
            if (visibleCount === 0) {
                filterInfo.textContent = 'Tidak ada rapat yang cocok dengan filter';
            } else {
                filterInfo.textContent = `Menampilkan ${visibleCount} rapat`;
            }

            // Show/hide empty state
            const emptyState = document.getElementById('emptyState');
            const hasFilters = getActiveFilterCount() > 0 || searchVal;

            if (visibleCount === 0) {
                if (hasFilters) {
                    document.getElementById('emptyIcon').className = 'fas fa-search text-5xl text-gray-300 mb-4';
                    document.getElementById('emptyTitle').textContent = 'Rapat tidak ditemukan';
                    let desc = 'Tidak ada rapat yang cocok dengan kriteria';
                    if (searchVal) desc += ' "' + searchVal + '"';
                    document.getElementById('emptyDesc').textContent = desc + '. Coba ubah kata kunci atau filter.';
                    document.getElementById('emptyAction').innerHTML = '<button onclick="clearSearch(); resetFilters();" class="text-indigo-600 hover:underline mt-2 inline-block"><i class="fas fa-times mr-1"></i>Hapus semua filter</button>';
                } else {
                    document.getElementById('emptyIcon').className = 'fas fa-folder-open text-5xl text-gray-300 mb-4';
                    document.getElementById('emptyTitle').textContent = 'Belum ada rapat';
                    document.getElementById('emptyDesc').textContent = 'Buat rapat baru untuk memulai';
                    document.getElementById('emptyAction').innerHTML = '<a href="/meetings/create" class="text-indigo-600 hover:underline mt-2 inline-block">Buat rapat baru</a>';
                }
                emptyState.classList.remove('hidden');
                document.getElementById('pagination').classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                if (!hasFilters) {
                    renderPagination();
                } else {
                    document.getElementById('pagination').classList.add('hidden');
                }
            }
        }

        function searchMeetings() {
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearch = '';
            document.getElementById('clearSearchBtn').classList.add('hidden');
            filterMeetings();
        }

        async function loadMeetings(page = 1) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('meetingList').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('pagination').classList.add('hidden');

            try {
                let url = '/meetings?page=' + page + '&page_size=' + pageSize;
                if (currentSearch) {
                    url += '&search=' + encodeURIComponent(currentSearch);
                }
                const res = await apiRequest('GET', url);
                if (res.success) {
                    const meetings = res.data.meetings || [];
                    totalMeetings = res.data.total || 0;
                    const container = document.getElementById('meetingList');
                    container.innerHTML = '';

                    if (meetings.length === 0) {
                        const emptyState = document.getElementById('emptyState');
                        if (currentSearch) {
                            document.getElementById('emptyIcon').className = 'fas fa-search text-5xl text-gray-300 mb-4';
                            document.getElementById('emptyTitle').textContent = 'Rapat tidak ditemukan';
                            document.getElementById('emptyDesc').textContent = 'Tidak ada rapat yang cocok dengan "' + currentSearch + '". Coba kata kunci lain.';
                            document.getElementById('emptyAction').innerHTML = '<button onclick="clearSearch()" class="text-indigo-600 hover:underline mt-2 inline-block"><i class="fas fa-times mr-1"></i>Hapus pencarian</button>';
                        } else {
                            document.getElementById('emptyIcon').className = 'fas fa-folder-open text-5xl text-gray-300 mb-4';
                            document.getElementById('emptyTitle').textContent = 'Belum ada rapat';
                            document.getElementById('emptyDesc').textContent = 'Buat rapat baru untuk memulai';
                            document.getElementById('emptyAction').innerHTML = '<a href="/meetings/create" class="text-indigo-600 hover:underline mt-2 inline-block">Buat rapat baru</a>';
                        }
                        emptyState.classList.remove('hidden');
                    } else {
                        // Collect unique locations for the location filter
                        const locations = new Set();
                        meetings.forEach(m => {
                            if (m.location) locations.add(m.location);
                        });

                        // Update location dropdown
                        const locationSelect = document.getElementById('filterLocation');
                        const currentVal = locationSelect.value;
                        locationSelect.innerHTML = '<option value="">Semua Lokasi</option>';
                        [...locations].sort().forEach(loc => {
                            const opt = document.createElement('option');
                            opt.value = loc;
                            opt.textContent = loc;
                            locationSelect.appendChild(opt);
                        });
                        if (currentVal && locations.has(currentVal)) {
                            locationSelect.value = currentVal;
                        }

                        meetings.forEach(m => {
                            const card = document.createElement('div');
                            card.className = 'meeting-card bg-white rounded-lg shadow p-4 hover:shadow-md transition flex justify-between items-start';
                            card.id = 'meeting-' + m.id;
                            card.setAttribute('data-title', m.title || '');
                            card.setAttribute('data-location', m.location || '');
                            card.setAttribute('data-status', m.status || 'pending');
                            card.setAttribute('data-date', m.date || '');
                            const statusMap = { 'completed': 'Selesai', 'processing': 'Diproses', 'pending': 'Menunggu', 'failed': 'Gagal', 'transcribed': 'Tertranskrip' };
                            const statusColors = { 'completed': 'bg-green-100 text-green-700', 'processing': 'bg-yellow-100 text-yellow-700', 'pending': 'bg-gray-100 text-gray-600', 'failed': 'bg-red-100 text-red-700', 'transcribed': 'bg-blue-100 text-blue-700' };
                            const status = m.status || 'pending';
                            card.innerHTML = `
                                <a href="/meetings/${m.id}" class="flex-1 min-w-0">
                                    <h3 class="font-semibold text-gray-800 truncate">${m.title || 'Rapat'}</h3>
                                    <div class="text-sm text-gray-500 mt-1 flex flex-wrap gap-x-4">
                                        <span><i class="fas fa-calendar mr-1"></i>${m.date || '-'}</span>
                                        <span><i class="fas fa-map-marker-alt mr-1"></i>${m.location || '-'}</span>
                                    </div>
                                </a>
                                <div class="flex items-center gap-2 flex-shrink-0 ml-2">
                                    <span class="status-badge px-2 py-1 rounded-full font-medium ${statusColors[status] || 'bg-gray-100 text-gray-600'}">${statusMap[status] || status}</span>
                                    <button onclick="deleteMeeting(${m.id}, '${m.title ? m.title.replace(/'/g, "\\'") : 'Rapat'}')" class="delete-btn p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Hapus rapat">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            `;
                            container.appendChild(card);
                        });
                        container.classList.remove('hidden');

                        // Apply any active filters
                        const hasFilters = getActiveFilterCount() > 0 || currentSearch;
                        if (hasFilters) {
                            filterMeetings();
                        } else {
                            renderPagination();
                        }
                    }
                } else {
                    document.getElementById('meetingList').innerHTML = '<p class="text-red-500 text-center">Gagal memuat data: ' + (res.error || 'Unknown error') + '</p>';
                    document.getElementById('meetingList').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('meetingList').innerHTML = '<p class="text-red-500 text-center">Gagal memuat data: ' + err.message + '</p>';
                document.getElementById('meetingList').classList.remove('hidden');
            }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalMeetings / pageSize);
            if (totalPages <= 1) return;

            const container = document.getElementById('pagination');
            container.innerHTML = '';
            container.classList.remove('hidden');

            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '<i class="fas fa-chevron-left mr-1"></i> Sebelumnya';
            prevBtn.className = 'px-4 py-2 border rounded-lg text-sm ' + (currentPage <= 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'hover:bg-gray-50');
            prevBtn.disabled = currentPage <= 1;
            prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; loadMeetings(currentPage); } };
            container.appendChild(prevBtn);

            const pageInfo = document.createElement('span');
            pageInfo.className = 'text-sm text-gray-600';
            pageInfo.textContent = 'Halaman ' + currentPage + ' dari ' + totalPages;
            container.appendChild(pageInfo);

            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = 'Selanjutnya <i class="fas fa-chevron-right ml-1"></i>';
            nextBtn.className = 'px-4 py-2 border rounded-lg text-sm ' + (currentPage >= totalPages ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'hover:bg-gray-50');
            nextBtn.disabled = currentPage >= totalPages;
            nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; loadMeetings(currentPage); } };
            container.appendChild(nextBtn);
        }

        async function deleteMeeting(id, title) {
            if (!confirm(`Apakah Anda yakin ingin menghapus rapat "${title}"? Data yang sudah dihapus tidak dapat dikembalikan.`)) return;

            const card = document.getElementById('meeting-' + id);
            if (card) {
                card.style.opacity = '0.5';
                card.style.pointerEvents = 'none';
            }

            try {
                const res = await apiRequest('DELETE', '/meetings/' + id);
                if (res.success) {
                    showAlert('✅ Rapat "' + title + '" berhasil dihapus', 'success');
                    if (card) card.remove();
                    const container = document.getElementById('meetingList');
                    if (container.children.length === 0) {
                        container.classList.add('hidden');
                        document.getElementById('emptyState').classList.remove('hidden');
                        document.getElementById('pagination').classList.add('hidden');
                    }
                } else {
                    showAlert('❌ ' + (res.error || 'Gagal menghapus rapat'), 'error');
                    if (card) {
                        card.style.opacity = '1';
                        card.style.pointerEvents = 'auto';
                    }
                }
            } catch (err) {
                showAlert('❌ Gagal menghapus rapat: ' + err.message, 'error');
                if (card) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) { window.location.href = '/login'; return; }
            document.getElementById('userName').textContent = user.name || 'User';
            loadMeetings();
        });
    </script>
</body>
</html>
