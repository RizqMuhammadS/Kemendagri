<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Rapat Baru - Sistem Notulensi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { min-height: 100vh; }
        @media (max-width: 768px) { .sidebar { min-height: auto; } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col md:flex-row">
        <aside class="sidebar bg-indigo-800 text-white w-full md:w-64 p-4">
            <div class="text-xl font-bold mb-8">
                <i class="fas fa-file-alt mr-2"></i>Notulensi AI
            </div>
            <nav>
                <a href="/dashboard" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-tachometer-alt w-6"></i> Dashboard
                </a>
                <a href="/meetings" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-list w-6"></i> Daftar Rapat
                </a>
                <a href="/meetings/create" class="flex items-center py-2 px-4 rounded bg-indigo-700 mb-1">
                    <i class="fas fa-plus-circle w-6"></i> Buat Rapat
                </a>
                <hr class="my-4 border-indigo-600">
                <div id="userName" class="text-sm px-4 mb-2 opacity-75">User</div>
                <button onclick="logout()" class="flex items-center py-2 px-4 rounded hover:bg-red-600 w-full text-left">
                    <i class="fas fa-sign-out-alt w-6"></i> Logout
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-3xl font-bold text-gray-800 mb-6">Buat Rapat Baru</h1>

                <div id="errorMsg" class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4 hidden"></div>
                <div id="successMsg" class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4 hidden"></div>

                <form id="createMeetingForm" class="bg-white rounded-lg shadow p-6 space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Judul Rapat *</label>
                        <input type="text" id="title" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="Masukkan judul rapat">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Tanggal *</label>
                        <input type="date" id="date" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Waktu Mulai</label>
                        <input type="time" id="start_time"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Waktu Selesai</label>
                        <input type="time" id="end_time"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Lokasi</label>
                        <input type="text" id="location"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="Ruangan atau link meeting">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Deskripsi / Agenda</label>
                        <textarea id="description" rows="4"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="Deskripsi rapat..."></textarea>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Peserta (pisahkan dengan koma)</label>
                        <input type="text" id="participants"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="nama1@email.com, nama2@email.com">
                    </div>

                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-200">
                        <i class="fas fa-save mr-2"></i>Simpan Rapat
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        function getToken() { return localStorage.getItem('token'); }
        async function apiRequest(method, path, data) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const config = { method, headers };
            if (data) config.body = JSON.stringify(data);
            const res = await fetch(API_BASE + path, config);
            const json = await res.json();
            if (!json.success && res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
            return json;
        }
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = 'fixed top-4 right-4 px-6 py-3 rounded shadow-lg text-white z-50 ' + (type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) { window.location.href = '/login'; return; }
            document.getElementById('userName').textContent = user.name || 'User';

            // Set default date to today
            document.getElementById('date').valueAsDate = new Date();
        });

        document.getElementById('createMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan...';

            try {
                // Parse participants: support "name1, name2" or "name1 <email>, name2 <email>"
                const participantsStr = document.getElementById('participants').value.trim();
                const participants = participantsStr ? participantsStr.split(',').map(s => {
                    s = s.trim();
                    if (!s) return null;
                    // Check for "Name <email>" format
                    const match = s.match(/^(.+?)\s*<(.+?)>$/);
                    if (match) {
                        return { name: match[1].trim(), email: match[2].trim(), role: 'attendee' };
                    }
                    return { name: s, email: '', role: 'attendee' };
                }).filter(p => p !== null) : [];

                const res = await apiRequest('POST', '/meetings', {
                    title: document.getElementById('title').value,
                    date: document.getElementById('date').value,
                    location: document.getElementById('location').value,
                    participants: participants
                });

                if (res.success) {
                    showAlert('Rapat berhasil dibuat!', 'success');
                    setTimeout(() => {
                        window.location.href = '/meetings/' + res.data.id;
                    }, 1000);
                } else {
                    document.getElementById('errorMsg').textContent = res.error || 'Gagal membuat rapat';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Terjadi kesalahan koneksi';
                document.getElementById('errorMsg').classList.remove('hidden');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i>Simpan Rapat';
        });
    </script>
</body>
</html>
