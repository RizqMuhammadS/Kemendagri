<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rapat - Sistem Notulensi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { min-height: 100vh; }
        @media (max-width: 768px) { .sidebar { min-height: auto; } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col md:flex-row">
        <aside class="sidebar bg-indigo-800 text-white w-full md:w-64 p-4">
            <div class="text-xl font-bold mb-8">
                <i class="fas fa-file-alt mr-2"></i>Notulensi AI
            </div>
            <nav>
                <a href="/dashboard" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-tachometer-alt w-6"></i> Dashboard
                </a>
                <a href="/meetings" class="flex items-center py-2 px-4 rounded bg-indigo-700 mb-1">
                    <i class="fas fa-list w-6"></i> Daftar Rapat
                </a>
                <a href="/meetings/create" class="flex items-center py-2 px-4 rounded hover:bg-indigo-700 mb-1">
                    <i class="fas fa-plus-circle w-6"></i> Buat Rapat
                </a>
                <hr class="my-4 border-indigo-600">
                <div id="userName" class="text-sm px-4 mb-2 opacity-75">User</div>
                <button onclick="logout()" class="flex items-center py-2 px-4 rounded hover:bg-red-600 w-full text-left">
                    <i class="fas fa-sign-out-alt w-6"></i> Logout
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold text-gray-800">Daftar Rapat</h1>
                    <a href="/meetings/create" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                        <i class="fas fa-plus mr-2"></i>Buat Rapat
                    </a>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div id="meetingsList" class="divide-y">
                        <div class="p-6 text-center text-gray-500">
                            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                            <p>Memuat data...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        function getToken() { return localStorage.getItem('token'); }
        async function apiRequest(method, path, data) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const config = { method, headers };
            if (data) config.body = JSON.stringify(data);
            const res = await fetch(API_BASE + path, config);
            const json = await res.json();
            if (!json.success && res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
            return json;
        }
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = 'fixed top-4 right-4 px-6 py-3 rounded shadow-lg text-white z-50 ' + (type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) { window.location.href = '/login'; return; }
            document.getElementById('userName').textContent = user.name || 'User';

            try {
                const res = await apiRequest('GET', '/meetings?page=1&page_size=50');
                const list = document.getElementById('meetingsList');

                const meetingsList = res.data && res.data.meetings ? res.data.meetings : (Array.isArray(res.data) ? res.data : []);
                if (meetingsList.length > 0) {
                    list.innerHTML = meetingsList.map(m => `
                        <a href="/meetings/${m.id}" class="block p-4 hover:bg-gray-50 transition">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="font-semibold text-gray-800 text-lg">${m.title}</div>
                                    <div class="text-sm text-gray-500 mt-1">
                                        <i class="fas fa-calendar mr-1"></i>${m.date || '-'}
                                        <i class="fas fa-map-marker-alt ml-3 mr-1"></i>${m.location || '-'}
                                    </div>
                                    <div class="text-sm text-gray-500 mt-1">
                                        <i class="fas fa-user mr-1"></i>${m.participant_count || 0} peserta
                                    </div>
                                </div>
                                <span class="px-3 py-1 text-xs rounded-full font-medium ${
                                    m.status === 'completed' ? 'bg-green-100 text-green-700' :
                                    m.status === 'in_progress' ? 'bg-yellow-100 text-yellow-700' :
                                    'bg-gray-100 text-gray-600'
                                }">${m.status || 'draft'}</span>
                            </div>
                        </a>
                    `).join('');
                } else {
                    list.innerHTML = `
                        <div class="p-12 text-center">
                            <i class="fas fa-folder-open text-5xl text-gray-300 mb-4"></i>
                            <p class="text-gray-500 text-lg">Belum ada rapat</p>
                            <a href="/meetings/create" class="inline-block mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Buat Rapat Baru</a>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('meetingsList').innerHTML = '<div class="p-6 text-center text-red-500">Gagal memuat data rapat</div>';
            }
        });
    </script>
</body>
</html>
